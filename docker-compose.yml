services:
  kanban-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kanban-app
    networks:
     - kanban-shared-services
    ports:
      - "${PRODUCTION_PORT}:3000"
    environment:
      STAGE: production
    env_file:
      - .env
    depends_on:
      kanban-db:
        condition: service_healthy
      kanban-rabbitmq:
        condition: service_healthy
   
  kanban-app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: kanban-app-dev
    networks:
     - kanban-shared-services
    working_dir: /app
    ports:
      - "${DEVELOPMENT_PORT}:3000"
    volumes:
      - ./:/app
      - kanban_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      STAGE: development
      NODE_ENV: development
      WATCHPACK_POLLING: true
      CHOKIDAR_USEPOLLING: true
      CHOKIDAR_INTERVAL: 1000
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      kanban-db:
        condition: service_healthy
      kanban-rabbitmq:
        condition: service_healthy

  kanban-db:
    image: postgres:18-alpine
    container_name: kanban-db
    networks:
     - kanban-shared-services
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data_vol:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  kanban-rabbitmq:
    image: rabbitmq:3-management
    container_name: kanban-rabbitmq
    restart: unless-stopped
    networks:
     - kanban-shared-services
    ports:
      - "${RABBITMQ_HOST_PORT}:${RABBITMQ_PORT}"
      - "${RABBITMQ_PANEL_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data_vol:
  kanban_node_modules:

networks:
  kanban-shared-services:
    external: true
